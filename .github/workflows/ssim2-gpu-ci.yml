name: ssim2-gpu CI

on:
  push:
    branches: [master]
    paths:
      - "crates/ssim2-gpu/**"
      - "crates/dssim-cuda/test_data/**"
      - ".github/workflows/ssim2-gpu-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/ssim2-gpu/**"
      - "crates/dssim-cuda/test_data/**"
      - ".github/workflows/ssim2-gpu-ci.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CI: true

# Default to bash everywhere — windows-latest's PowerShell can't parse
# bash-style `\` line continuations in our `run:` blocks.
defaults:
  run:
    shell: bash

jobs:
  # Compile-only check across host platforms. CUDA-less builds prove
  # the kernels and host code stay portable; the runtime tests below
  # validate behaviour where a GPU is available.
  compile:
    name: Compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-26-intel]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ssim2-gpu-${{ matrix.os }}
          # The workspace target dir is multi-GB; on windows the tar
          # post-step times out trying to save it. Skip target caching;
          # registry / git caches still apply so dependency downloads
          # don't repeat.
          cache-targets: false
      - name: Build (no_default_features + wgpu)
        run: cargo build -p ssim2-gpu --no-default-features --features wgpu --release --all-targets

  # Runtime tests on macOS via Metal (cubecl-wgpu's Metal backend).
  # macOS provides Metal natively, no Vulkan ICD setup needed. Both
  # Apple Silicon and Intel exercise the wgpu kernels end-to-end.
  metal-tests:
    name: Tests (Metal, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-26-intel]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ssim2-gpu-tests-${{ matrix.os }}

      - name: Verify Metal availability
        run: system_profiler SPDisplaysDataType | head -40 || true

      - name: Print cubecl capabilities (Metal)
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example print_capabilities

      # Run kernel-level parity *first* so a regression points at the
      # specific kernel. Keep all later steps gated on `if: always()`
      # so a single failure doesn't abort the rest — the goal in CI is
      # to get per-stage signal, not to bail on the first red.
      - name: Per-kernel parity — sRGB
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example srgb_parity
      - name: Per-kernel parity — XYB
        if: always()
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example xyb_parity
      - name: Per-kernel parity — blur (recursive Gaussian)
        if: always()
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example blur_parity
      - name: Doctests
        if: always()
        run: cargo test -p ssim2-gpu --no-default-features --features wgpu --release --doc
      - name: Integration tests (parity_lock)
        if: always()
        run: cargo test -p ssim2-gpu --no-default-features --features wgpu --release --test parity_lock
      - name: Full-pipeline smoke (end_to_end)
        if: always()
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example end_to_end
      - name: JPEG-corpus parity vs CPU ssimulacra2
        if: always()
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example parity_jpeg_corpus
      - name: Cached-reference smoke
        if: always()
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example cached_reference
      - name: Batched smoke
        if: always()
        run: cargo run -p ssim2-gpu --no-default-features --features wgpu --release --example batch_smoke

  # GitHub-hosted windows-latest doesn't expose a wgpu-compatible
  # adapter (no real GPU; the WARP fallback isn't picked up by wgpu's
  # request_adapter without force_fallback_adapter, which cubecl-wgpu
  # 0.10 doesn't surface). Skipped here — runs locally on a Windows
  # box with an actual GPU driver, or on a self-hosted runner.
