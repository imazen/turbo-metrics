name: Release zen-metrics CLI

# Tag-driven release workflow for the zen-metrics CLI binary.
#
# Fast path: a single linux-x86_64 job runs `cargo test` then
# `cargo build --release`, uploads the tarball, and creates the GitHub
# release as soon as it finishes (~5 min for a cached runner). The
# linux-x86_64 tarball is what vast.ai workers download, so this
# unblocks sweep launches without waiting for slow Windows / macOS
# builds. Other platforms run in parallel and append their tarballs
# to the same release as they finish.
#
# Triggers only on `zen-metrics-v*` tags so unrelated tags (or repo-wide
# version tags like `v0.3.0` for the workspace) don't fire spurious
# releases. Manual `workflow_dispatch` lets us smoke-test the matrix
# without cutting a real tag.

on:
  push:
    tags: ["zen-metrics-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. zen-metrics-v0.1.0). Required for manual dispatch."
        required: true
        type: string

permissions:
  contents: write  # create release + upload assets

env:
  CARGO_TERM_COLOR: always
  CI: true
  BIN_NAME: zen-metrics

defaults:
  run:
    shell: bash

jobs:
  # Resolve the version once so every job tarballs with the same name.
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Determine tag and version
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^zen-metrics-v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' must match zen-metrics-vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi
          VERSION="${TAG#zen-metrics-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

  # Fast path: linux-x86_64 test + build + create release. Vast.ai
  # workers grab the linux-x86_64 tarball, so making this asset
  # available ASAP unblocks sweeps. Other matrix builds run in
  # parallel and append to the same release as they finish.
  fast-linux:
    name: Fast linux-x86_64 (test + build + release)
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.release.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for --generate-notes

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry / git
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-x86_64-unknown-linux-gnu
          cache-targets: false

      - name: Test (release profile, sweep features)
        run: |
          set -euo pipefail
          cargo test --release -p zen-metrics-cli --features "gpu,gpu-wgpu,sweep,cpu-metrics"

      - name: Build (release profile, sweep features)
        run: |
          set -euo pipefail
          cargo build --release -p zen-metrics-cli --bin "${BIN_NAME}" --features "gpu,gpu-wgpu,sweep"

      - name: Strip binary
        run: |
          set -euo pipefail
          BIN="target/release/${BIN_NAME}"
          [[ -f "$BIN" ]] && strip "$BIN" || true

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          STAGE_DIR="${BIN_NAME}-${VERSION}-linux-x86_64"
          mkdir -p "dist/${STAGE_DIR}"
          cp "target/release/${BIN_NAME}" "dist/${STAGE_DIR}/"
          cp LICENSE-AGPL3 LICENSE-MIT README.md "dist/${STAGE_DIR}/" 2>/dev/null || true
          cd dist
          ARCHIVE="${STAGE_DIR}.tar.gz"
          tar -czf "${ARCHIVE}" "${STAGE_DIR}"
          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "Staged: dist/${ARCHIVE}"
          ls -la

      - name: Upload artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-linux-x86_64
          path: ${{ steps.stage.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

      - name: Create release with linux-x86_64 asset
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## zen-metrics ${{ needs.resolve.outputs.version }}

            CLI binary for the turbo-metrics image quality metric suite.
            Pick the archive matching your OS / architecture:

            - `${{ env.BIN_NAME }}-${{ needs.resolve.outputs.version }}-linux-x86_64.tar.gz` — Linux x86_64 (wgpu / Vulkan) **available now**
            - other platforms append as their builds finish

            Extract and run `${{ env.BIN_NAME }} --help` to see available metrics and options.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for release notes.
          files: ${{ steps.stage.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Other platforms — run in parallel with fast-linux. Each appends
  # its tarball to the release as soon as it finishes. We don't gate
  # release creation on these; vast.ai (the only consumer that needs
  # a tarball ASAP) is unblocked the moment fast-linux finishes.
  build-other:
    name: Build ${{ matrix.target }}
    needs: [resolve, fast-linux]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux aarch64 — wgpu only. ARM runners don't ship a CUDA SDK
          # we can lean on, so this is a portable wgpu build.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            features: ""
            archive: tar.gz
            artifact_suffix: linux-aarch64

          # Windows x86_64 — wgpu via DX12. MSVC pre-installed.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            archive: zip
            artifact_suffix: windows-x86_64

          # Windows aarch64 — required by global CI policy.
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            features: ""
            archive: zip
            artifact_suffix: windows-aarch64

          # macOS Apple Silicon — wgpu via Metal.
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            archive: tar.gz
            artifact_suffix: macos-aarch64

          # macOS Intel — required by global CI policy. macos-26-intel
          # is the current Intel runner; macos-latest is aarch64-only.
          - os: macos-26-intel
            target: x86_64-apple-darwin
            features: ""
            archive: tar.gz
            artifact_suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry / git
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-targets: false

      - name: Build zen-metrics (${{ matrix.target }})
        run: |
          set -euo pipefail
          FEATURES_ARG=""
          if [[ -n "${{ matrix.features }}" ]]; then
            FEATURES_ARG="--features ${{ matrix.features }}"
          fi
          cargo build --release --target ${{ matrix.target }} -p zen-metrics-cli --bin "${BIN_NAME}" $FEATURES_ARG

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${BIN_NAME}"
          if [[ -f "$BIN" ]]; then
            strip "$BIN" || true
          fi

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          STAGE_DIR="${BIN_NAME}-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "dist/${STAGE_DIR}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/${STAGE_DIR}/"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${STAGE_DIR}/"
          fi
          # Bundle license + readme so the tarball is self-describing.
          cp LICENSE-AGPL3 LICENSE-MIT README.md "dist/${STAGE_DIR}/" 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ARCHIVE="${STAGE_DIR}.zip"
            if command -v 7z >/dev/null 2>&1; then
              7z a -tzip "${ARCHIVE}" "${STAGE_DIR}" >/dev/null
            else
              # Fallback for runners without 7z (rare).
              python -c "import shutil; shutil.make_archive('${STAGE_DIR}', 'zip', '.', '${STAGE_DIR}')"
            fi
          else
            ARCHIVE="${STAGE_DIR}.tar.gz"
            tar -czf "${ARCHIVE}" "${STAGE_DIR}"
          fi
          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "Staged: dist/${ARCHIVE}"
          ls -la

      - name: Upload artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ steps.stage.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

      - name: Append asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: ${{ steps.stage.outputs.archive }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional Linux x86_64 CUDA-enabled artifact. Kept as a separate job
  # so a CUDA toolkit install failure doesn't block the portable wgpu
  # builds. Users who want CUDA download this asset; everyone else uses
  # the wgpu artifact above.
  linux-cuda:
    name: Build x86_64-linux-cuda
    needs: [resolve, fast-linux]
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CUDA_FEATURES: "cuda"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: "12.6.0"
          method: "network"
          # Driver libs aren't available on GitHub runners; only the
          # SDK pieces needed for compilation.
          sub-packages: '["nvcc", "cudart", "nvrtc-dev", "nvrtc"]'

      - name: Cache cargo registry / git
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-x86_64-linux-cuda
          cache-targets: false

      - name: Build zen-metrics with CUDA
        run: |
          set -euo pipefail
          # If the bin doesn't accept --features cuda the job will fail
          # and continue-on-error keeps the release going.
          cargo build --release -p zen-metrics-cli --bin "${BIN_NAME}" --features "${CUDA_FEATURES}"

      - name: Strip binary
        run: strip "target/release/${BIN_NAME}" || true

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          STAGE_DIR="${BIN_NAME}-${VERSION}-linux-x86_64-cuda"
          mkdir -p "dist/${STAGE_DIR}"
          cp "target/release/${BIN_NAME}" "dist/${STAGE_DIR}/"
          cp LICENSE-AGPL3 LICENSE-MIT README.md "dist/${STAGE_DIR}/" 2>/dev/null || true
          cd dist
          ARCHIVE="${STAGE_DIR}.tar.gz"
          tar -czf "${ARCHIVE}" "${STAGE_DIR}"
          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-linux-x86_64-cuda
          path: ${{ steps.stage.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

      - name: Append asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: ${{ steps.stage.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # i686 build for completeness per global CLAUDE.md ("Every crate MUST
  # also test on i686-unknown-linux-gnu"). GPU code almost certainly
  # won't link on 32-bit so we build with --no-default-features and
  # mark the job as continue-on-error — it's a portability sanity
  # check, not a shipping artifact gate.
  linux-i686:
    name: Build i686-unknown-linux-gnu
    needs: [resolve, fast-linux]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo registry / git
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-i686-unknown-linux-gnu
          cache-targets: false

      - name: Build zen-metrics (no default features)
        run: |
          set -euo pipefail
          cross build --release --target i686-unknown-linux-gnu \
            -p zen-metrics-cli --bin "${BIN_NAME}" --no-default-features

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          STAGE_DIR="${BIN_NAME}-${VERSION}-linux-i686"
          mkdir -p "dist/${STAGE_DIR}"
          cp "target/i686-unknown-linux-gnu/release/${BIN_NAME}" "dist/${STAGE_DIR}/"
          cp LICENSE-AGPL3 LICENSE-MIT README.md "dist/${STAGE_DIR}/" 2>/dev/null || true
          cd dist
          ARCHIVE="${STAGE_DIR}.tar.gz"
          tar -czf "${ARCHIVE}" "${STAGE_DIR}"
          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-linux-i686
          path: ${{ steps.stage.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

      - name: Append asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: ${{ steps.stage.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
