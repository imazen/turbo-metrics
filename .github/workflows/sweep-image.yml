name: Build & push zen-metrics-sweep image

# Builds the slim sweep-worker image (ubuntu + pre-built zen-metrics binary
# + onstart_v2.sh) and pushes to GHCR. Triggered on:
#   - push to main when the Dockerfile or worker script changes
#   - new zen-metrics-v* tag (matches release.yml's binary tags)
#   - manual workflow_dispatch (for fast iteration)

on:
  push:
    branches: [master, main]
    paths:
      - scripts/sweep/Dockerfile.sweep
      - scripts/sweep/onstart_v2.sh
      - .github/workflows/sweep-image.yml
    tags:
      - 'zen-metrics-v*'
  workflow_dispatch:
    inputs:
      zen_metrics_version:
        description: 'zen-metrics tag to bake (e.g. zen-metrics-v0.3.0)'
        required: true
        default: zen-metrics-v0.3.0

env:
  DEFAULT_ZEN_METRICS_VERSION: zen-metrics-v0.3.0

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # tags needed for the resolver fallback

      - name: Resolve zen-metrics version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/zen-metrics-v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.zen_metrics_version }}" ]]; then
            tag="${{ inputs.zen_metrics_version }}"
          else
            tag=$(git tag --sort=-creatordate -l 'zen-metrics-v*' | head -n1)
            [[ -z "$tag" ]] && tag="${DEFAULT_ZEN_METRICS_VERSION}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "short=${tag#zen-metrics-v}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$tag short=${tag#zen-metrics-v}"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch x86_64 + aarch64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/sweep/Dockerfile.sweep
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ZEN_METRICS_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ghcr.io/imazen/zen-metrics-sweep:${{ steps.version.outputs.short }}
            ghcr.io/imazen/zen-metrics-sweep:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
